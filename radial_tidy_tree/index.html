<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BauO Berlin - Radial Tidy Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Literata:opsz,wght@7..72,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>Radial Tidy Tree</h1>
        <p>Hierarchie aus ELI-TTL: Teil → Abschnitt → Paragraph → Absatz → Satz → Nummer</p>
      </header>

      <section class="panel">
        <div class="controls">
          <label for="dataSelect">Datensatz</label>
          <select id="dataSelect">
            <option value="bauo_be_2005_tree.json">BauO BE 2005</option>
          </select>
        </div>
        <div class="content-grid">
          <div id="chart"></div>
          <aside id="details" class="details-panel">
            <h2>Ausgewaehlter Knoten</h2>
            <p class="details-hint">Klicke auf einen Knoten fuer Metadaten und Volltextbeschreibung.</p>
            <div id="detailsBody"></div>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="app.js"></script>
  </body>
</html>
